services:
  - type: web
    name: rwa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # You'll enter this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # You'll enter this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set this to your Vercel URL after deploying frontend
